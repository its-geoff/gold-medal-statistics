<!DOCTYPE html>
<html>

<head>
   <meta charset="utf-8">
   <title></title>

   <!-- loads static files (files used to render webpage) -->
   {% load static %}

   <link rel="icon" href="{% static 'gms/favicon.ico' %}">
   <link rel="stylesheet" href="{% static 'gms/style.css' %}">
</head>

<body>
   <form action="{% url 'gms:new_entry' %}" method="post">
      {% csrf_token %}
      <fieldset>
         <input type="text" id="name" name="name" maxlength="50" placeholder="ATHLETE">
         <input type="text" id="gender" name="gender" maxlength="5" placeholder="GENDER">
         <input type="number" id="grade" name="grade" step="1" min="9" max="12" placeholder="GRADE">
         <input type="text" id="team" name="team" maxlength="50" placeholder="TEAM">
         <input type="text" id="event" name="event" maxlength="10" placeholder="EVENT">
         <input type="text" id="mark" name="mark" maxlength="8" placeholder="MARK">
      </fieldset>
      <div class="submit-container">
         <input class="button" type="submit" value="SUBMIT">
      </div>
   </form>
   <div class="new-entry-container">
      <a class="button">+ NEW ENTRY</a>
   </div>
</body>

</html>
